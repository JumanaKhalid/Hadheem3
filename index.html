<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأثير الغذاء على الوجه - AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-face-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      
      /* تنسيق الأزرار لتظهر فوق الكاميرا */
      #ui-container {
        position: absolute;
        bottom: 30px;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 20px;
        z-index: 1000; /* لضمان ظهور الأزرار فوق الكاميرا */
      }

      button {
        padding: 15px 25px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }

      #btn-healthy { background-color: #4CAF50; color: white; }
      #btn-unhealthy { background-color: #f44336; color: white; }
    </style>
  </head>
  <body>

    <div id="ui-container">
      <button id="btn-healthy">غذاء صحي 🍎</button>
      <button id="btn-unhealthy">غذاء غير صحي 🍔</button>
    </div>

    <a-scene mindar-face embedded color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera active="false" position="0 0 0"></a-camera>

      <a-entity mindar-face-target="anchorIndex: 1">
        
        <a-entity id="healthy-effects" visible="false">
          <a-circle color="#FF69B4" radius="0.08" opacity="0.5" position="0.15 -0.1 0.1"></a-circle>
          <a-circle color="#FF69B4" radius="0.08" opacity="0.5" position="-0.15 -0.1 0.1"></a-circle>
        </a-entity>

        <a-entity id="unhealthy-effects" visible="false">
          <a-circle color="#000000" radius="0.06" opacity="0.6" position="0.08 0.1 0.1"></a-circle>
          <a-circle color="#000000" radius="0.06" opacity="0.6" position="-0.08 0.1 0.1"></a-circle>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      // 1. جلب الأزرار ومجموعات التأثيرات من الكود أعلاه
      const btnHealthy = document.getElementById('btn-healthy');
      const btnUnhealthy = document.getElementById('btn-unhealthy');
      const healthyEffects = document.getElementById('healthy-effects');
      const unhealthyEffects = document.getElementById('unhealthy-effects');

      // 2. وظيفة عند الضغط على زر "غذاء صحي"
      btnHealthy.addEventListener('click', () => {
        healthyEffects.setAttribute('visible', 'true'); // إظهار الصحة
        unhealthyEffects.setAttribute('visible', 'false'); // إخفاء الإرهاق
      });

      // 3. وظيفة عند الضغط على زر "غذاء غير صحي"
      btnUnhealthy.addEventListener('click', () => {
        healthyEffects.setAttribute('visible', 'false'); // إخفاء الصحة
        unhealthyEffects.setAttribute('visible', 'true'); // إظهار الإرهاق
      });
    </script>
  </body>
</html>
