<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اختيار الغذاء الصحي - AR</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-face-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* واجهة الأزرار */
        #ui-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            color: white;
        }

        button:active { transform: scale(0.9); }

        #btn-healthy { background: linear-gradient(135deg, #4CAF50, #81C784); }
        #btn-unhealthy { background: linear-gradient(135deg, #f44336, #e57373); }

        /* رسالة توضيحية في البداية */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">جاري تشغيل الكاميرا الأمامية...</div>

    <div id="ui-container">
        <button id="btn-healthy">🍎 غذاء صحي</button>
        <button id="btn-unhealthy">🍔 غذاء غير صحي</button>
    </div>

    <a-scene 
        mindar-face="cameraDevice: user" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera active="false" position="0 0 0"></a-camera>

        <a-entity id="healthy-effects" visible="false">
            <a-sphere mindar-face-target="anchorIndex: 187" radius="0.06" color="#FFB6C1" opacity="0.4"></a-sphere>
            <a-sphere mindar-face-target="anchorIndex: 411" radius="0.06" color="#FFB6C1" opacity="0.4"></a-sphere>
            
            <a-plane mindar-face-target="anchorIndex: 10" width="0.3" height="0.15" material="color: #ffffff; opacity: 0.15" rotation="0 0 0"></a-plane>
            
            <a-entity mindar-face-target="anchorIndex: 13">
                <a-ellipse radius-x="0.04" radius-y="0.015" color="#FFFFFF" opacity="0.7"></a-ellipse>
            </a-entity>
        </a-entity>

        <a-entity id="unhealthy-effects" visible="false">
            <a-ellipse mindar-face-target="anchorIndex: 174" radius-x="0.05" radius-y="0.025" color="#2c1e1e" opacity="0.7"></a-ellipse>
            <a-ellipse mindar-face-target="anchorIndex: 399" radius-x="0.05" radius-y="0.025" color="#2c1e1e" opacity="0.7"></a-ellipse>
            
            <a-plane mindar-face-target="anchorIndex: 1" width="1" height="1" material="color: #556b2f; opacity: 0.1" position="0 0 -0.05"></a-plane>

            <a-entity mindar-face-target="anchorIndex: 13">
                <a-ellipse radius-x="0.04" radius-y="0.015" color="#9b870c" opacity="0.6"></a-ellipse>
                <a-circle radius="0.005" color="#000000" position="0.01 0 0.01"></a-circle>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        // إخفاء رسالة التحميل بمجرد بدء تشغيل تتبع الوجه
        const sceneEl = document.querySelector('a-scene');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        sceneEl.addEventListener("targetFound", () => {
            loadingOverlay.style.display = 'none';
        });

        const btnHealthy = document.getElementById('btn-healthy');
        const btnUnhealthy = document.getElementById('btn-unhealthy');
        const healthyEffects = document.getElementById('healthy-effects');
        const unhealthyEffects = document.getElementById('unhealthy-effects');

        btnHealthy.addEventListener('click', () => {
            healthyEffects.setAttribute('visible', 'true');
            unhealthyEffects.setAttribute('visible', 'false');
        });

        btnUnhealthy.addEventListener('click', () => {
            healthyEffects.setAttribute('visible', 'false');
            unhealthyEffects.setAttribute('visible', 'true');
        });
    </script>
</body>
</html>
